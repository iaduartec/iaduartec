name: Issue Auto Responder (Duartec Safe + Repo Context)

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-auto-responder-${{ github.repository }}-${{ github.event.issue.number || github.event.comment.issue_url }}
  cancel-in-progress: true

jobs:
  respond:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (for docs context)
        if: github.eventName != 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Gate + collect issue data + prior comments
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;

            let issue;
            let triggerCommentBody = "";

            if (eventName === "issues") {
              issue = context.payload.issue;
            } else if (eventName === "issue_comment") {
              issue = context.payload.issue;
              triggerCommentBody = (context.payload.comment?.body || "");
            } else if (eventName === "workflow_dispatch") {
              // Allow manual runs; but without issue context we cannot post.
              core.setOutput("should_run", "false");
              return;
            } else {
              core.setOutput("should_run", "false");
              return;
            }

            // Avoid loops
            const authorType = issue.user?.type || "";
            if (authorType === "Bot") {
              core.setOutput("should_run", "false");
              return;
            }

            // For issue_comment: only run if explicitly asked
            const forced = (eventName === "issue_comment" && triggerCommentBody.includes("/triage"));

            // If locked, skip
            if (issue.locked && !forced) {
              core.setOutput("should_run", "false");
              return;
            }

            // Avoid duplicates (unless forced)
            const marker = "<!-- duartec-auto-triage -->";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const already = comments.some(c => (c.body || "").includes(marker));
            if (already && eventName === "issues" && !forced) {
              core.setOutput("should_run", "false");
              return;
            }

            // Build prior comments context (last 12, excluding our marker)
            const prior = comments
              .filter(c => !(c.body || "").includes(marker))
              .slice(-12)
              .map(c => {
                const user = c.user?.login || "unknown";
                const created = c.created_at || "";
                const body = (c.body || "").slice(0, 4000);
                return `- ${user} (${created}):\n${body}`;
              })
              .join("\n\n");

            // Minimal-signal gate (skip “hola no funciona” issues unless forced)
            // Signals: error/log/stack/trace/version/pasos + code fences
            const title = issue.title || "";
            const body = issue.body || "";
            const hayCodigo = body.includes("```");
            const haySenal = /error|exception|stack|trace|failed|fail|log|logs|version|versi[oó]n|ubuntu|windows|docker|compose|systemd|caddy|next\.js|vercel|ollama|openclaw|webui|playwright|tailscale|repro|steps|pasos/i.test(title + "\n" + body);

            // If not forced, require some signal or code fence
            // 0) Allowed tech gate (ONLY respond if the issue seems about allowed tech)
// Add/remove keywords as you like.
const allowedTech = [
  { name: "OpenClaw", re: /\bopenclaw\b/i },
  { name: "Ollama", re: /\bollama\b/i },
  { name: "Open WebUI", re: /\bopen\s*webui\b|\bopen-webui\b|\bwebui\b/i },
  { name: "Next.js", re: /\bnext\.?js\b|\bnextjs\b/i },
  { name: "Vercel", re: /\bvercel\b/i },
  { name: "Docker", re: /\bdocker\b|\bdockerfile\b|\bdocker-compose\b|\bcompose\b/i },
  { name: "GitHub Actions", re: /\bgithub\s*actions\b|\bworkflow\b|\byml\b|\byaml\b/i },
  { name: "Playwright", re: /\bplaywright\b/i },
  { name: "Tailscale", re: /\btailscale\b|\btailscaled\b/i },
  { name: "Caddy", re: /\bcaddy\b|\bcaddyfile\b/i },
  { name: "Ubuntu/systemd", re: /\bubuntu\b|\bsystemd\b|\bsystemctl\b|\bjournalctl\b/i },
  { name: "Hikvision", re: /\bhikvision\b|\bhik\b/i },
  { name: "Dahua", re: /\bdahua\b/i },
];

const text = (title + "\n" + body);
const matched = allowedTech.filter(t => t.re.test(text)).map(t => t.name);
const isAllowed = matched.length > 0;

// Minimal-signal gate (skip weak issues unless forced)
const hayCodigo = body.includes("```");
const haySenal = /error|exception|stack|trace|failed|fail|log|logs|version|versi[oó]n|repro|steps|pasos/i.test(text);

// DECISION:
// - If not forced: must be allowed-tech AND have minimal signals (or code fence)
// - If forced (/triage): allow even if tech not detected, but keep it safe (the model will ask for info).
if (!forced) {
  if (!isAllowed) {
    core.setOutput("should_run", "false");
    return;
  }
  if (!(haySenal || hayCodigo)) {
    core.setOutput("should_run", "false");
    return;
  }
}

core.setOutput("allowed_tech", matched.join(", "));

            core.setOutput("should_run", "true");
            core.setOutput("forced", forced ? "true" : "false");
            core.setOutput("issue_number", String(issue.number));
            core.setOutput("issue_title", title);
            core.setOutput("issue_body", body);
            core.setOutput("prior_comments", prior);

      - name: Stop if gated
        if: steps.gate.outputs.should_run != 'true'
        run: echo "Gated - not responding (missing minimal signals)."

      - name: Build repo context (README/docs/templates)
        if: steps.gate.outputs.should_run == 'true'
        id: repoctx
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          // Files/globs (simple walk) – keep it small and relevant
          const roots = [
            "README.md","README.MD","README.txt","README",
            "CONTRIBUTING.md","CONTRIBUTING.MD","SECURITY.md","CODE_OF_CONDUCT.md"
          ];

          function walk(dir, out=[]) {
            if (!fs.existsSync(dir)) return out;
            const entries = fs.readdirSync(dir, { withFileTypes: true });
            for (const e of entries) {
              const p = path.join(dir, e.name);
              if (e.isDirectory()) walk(p, out);
              else out.push(p);
            }
            return out;
          }

          const files = new Set();
          for (const f of roots) if (fs.existsSync(f)) files.add(f);

          // docs/**/*.md
          for (const p of walk("docs")) if (p.toLowerCase().endsWith(".md")) files.add(p);

          // .github/ISSUE_TEMPLATE/**
          for (const p of walk(path.join(".github","ISSUE_TEMPLATE"))) files.add(p);

          // Build context with hard size cap
          const MAX_CHARS = 18000;
          let buf = "";
          const sorted = Array.from(files).sort();

          for (const f of sorted) {
            try {
              const content = fs.readFileSync(f, "utf8");
              const snippet = content.slice(0, 6000); // per-file cap
              const block = `\n\n===== FILE: ${f} =====\n${snippet}\n`;
              if ((buf.length + block.length) > MAX_CHARS) break;
              buf += block;
            } catch {}
          }

          fs.writeFileSync("repo_context.txt", buf || "(no repo context files found)");
          console.log("Repo context chars:", (buf || "").length);
          NODE

      - name: Generate reply (OpenAI Responses API)
        if: steps.gate.outputs.should_run == 'true'
        id: gen
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ steps.gate.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.gate.outputs.issue_body }}
          PRIOR_COMMENTS: ${{ steps.gate.outputs.prior_comments }}
          FORCED: ${{ steps.gate.outputs.forced }}
        run: |
          node <<'NODE'
          const https = require("https");
          const fs = require("fs");

          const issueTitle = process.env.ISSUE_TITLE || "";
          const issueBody = process.env.ISSUE_BODY || "";
          const priorComments = process.env.PRIOR_COMMENTS || "";
          const forced = process.env.FORCED === "true";

          const repoContext = fs.existsSync("repo_context.txt")
            ? fs.readFileSync("repo_context.txt", "utf8")
            : "(repo context not available)";

          const instructions = `
Eres asistente técnico para responder GitHub Issues/Discussions.

OBJETIVO
Redactar una respuesta útil y publicable SOLO con información:
- Documentación oficial o repos conocidos: OpenClaw, Ollama, Open WebUI, Next.js, Vercel, Docker, GitHub Actions, Playwright, Tailscale, Caddy, Ubuntu/systemd, Hikvision/Dahua cuando aplique.
- O experiencia previa aportada por el usuario.
- O comandos estándar y seguros (diagnóstico/lectura) que no rompan nada.

REGLAS CRÍTICAS
- No inventes soluciones.
- No des comandos “probables” si no son estándar/seguros o no están verificados.
- Si no hay base suficiente: pide datos concretos (logs/versión/config).
- Diferencia claramente: (1) Hecho comprobado (2) Hipótesis razonable (3) Información que falta.
- Evita sudo salvo imprescindible; si hace falta, indícalo y por qué.
- No prometas que algo lo arregla si no está probado.
- No menciones que esto lo escribió una IA.
- Revisa y respeta lo que ya han respondido otros: no repitas lo mismo; añade el siguiente paso o pide solo lo que falte.
- Usa el “Repo context” como fuente prioritaria SI aplica al caso.

POLÍTICA DE RESPUESTA
- Si no hay señales suficientes en el issue, tu respuesta debe ser pedir datos concretos (pero si ya lo pidieron en comentarios, no repitas; pide lo que falta).
- No incluyas enlaces inventados. Si citas fuente, referencia: "Documentación oficial de X" o "Archivo del repo: <ruta>".
- Mantén la respuesta breve y publicable.

FORMATO DE SALIDA (OBLIGATORIO)
1. Nivel de seguridad: Alta / Media / Baja
2. Base usada: (docs oficiales / repo / issue confirmado / experiencia previa) o “no hay base suficiente”
3. Información que falta: lista concreta
4. Respuesta lista para publicar: breve, natural, técnica
5. Versión corta: 2-4 líneas
          `.trim();

          const input = `
Issue title:
${issueTitle}

Issue body:
${issueBody}

Prior comments (what others already wrote):
${priorComments || "(none)"}

Repo context (selected files from this repository):
${repoContext}
          `.trim();

          const payload = JSON.stringify({
            model: "gpt-5.5",
            input: [
              { role: "system", content: instructions },
              { role: "user", content: input }
            ]
          });

          const req = https.request(
            {
              hostname: "api.openai.com",
              path: "/v1/responses",
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`,
                "Content-Length": Buffer.byteLength(payload),
              },
            },
            (res) => {
              let data = "";
              res.on("data", (chunk) => (data += chunk));
              res.on("end", () => {
                if (res.statusCode < 200 || res.statusCode >= 300) {
                  console.error("OpenAI error:", res.statusCode, data);
                  process.exit(1);
                }

                const obj = JSON.parse(data);
                let text = obj.output_text || "";

                if (!text && Array.isArray(obj.output)) {
                  for (const item of obj.output) {
                    if (item?.type === "message" && Array.isArray(item.content)) {
                      for (const c of item.content) {
                        if (c?.type === "output_text" && c.text) text += c.text;
                      }
                    }
                  }
                }

                fs.appendFileSync(process.env.GITHUB_OUTPUT, `reply<<EOF\n${text}\nEOF\n`);
              });
            }
          );

          req.on("error", (e) => {
            console.error(e);
            process.exit(1);
          });

          req.write(payload);
          req.end();
          NODE

      - name: Post comment
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = Number("${{ steps.gate.outputs.issue_number }}");
            const reply = `${{ steps.gen.outputs.reply }}`.trim();

            const marker = "<!-- duartec-auto-triage -->";
            const body = `${marker}\n${reply}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });
